name: Fight Pick'em League
on:
  schedule:
    - cron: '20 */6 * * *'   # score finished cards + refresh the Fight IQ board
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: bot-predictions
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Score pick'em polls and update the leaderboard
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python predictions_bot.py
      - name: Save state
        run: |
          git config user.name "iboyprime-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add state_predictions.json 2>/dev/null || true
          git commit -m "predictions state [skip ci]" || echo "no changes"
          git push || true
