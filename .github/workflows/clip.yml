name: Clip of the Week
on:
  schedule:
    - cron: '0 15 * * 1'   # Monday 15:00 UTC - open the new Clip War thread
    - cron: '0 20 * * 0'   # Sunday 20:00 UTC - count reactions + crown the champ
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: bot-clip
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Open or crown the weekly Clip War
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python clip_bot.py
      - name: Save state
        run: |
          git config user.name "iboyprime-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add state_clip.json 2>/dev/null || true
          git commit -m "clip state [skip ci]" || echo "no changes"
          git push || true
