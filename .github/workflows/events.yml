name: Auto Scheduled Events
on:
  schedule:
    - cron: '7 */6 * * *'   # every 6 hours (offset to stagger from other bots)
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: bot-events
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Create/refresh Discord scheduled events
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python events_bot.py
      - name: Save state
        run: |
          git config user.name "iboyprime-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add state_events.json 2>/dev/null || true
          git commit -m "events state [skip ci]" || echo "no changes"
          git push || true
