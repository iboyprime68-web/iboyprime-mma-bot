name: YouTube notifier (uploads + go-live)
on:
  schedule:
    - cron: '*/5 * * * *'    # re-queues the next ~55-min window; inside it the bot checks
                             # every ~30s so new uploads land near-instantly
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: bot-youtube
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Post new uploads / go-live
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python youtube_bot.py
      - name: Save state
        run: |
          git config user.name "iboyprime-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add state_youtube.json 2>/dev/null || true
          git commit -m "youtube state [skip ci]" || echo "no changes"
          git push || true
