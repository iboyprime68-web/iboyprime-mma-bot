name: NSFW Image Scan
on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min, then polls ~1/min internally (run_loop)
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: bot-image-scan
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Cheap, stdlib-only gate: if NO channel is flagged nsfw_images we skip the
      # heavy ONNX install + scan entirely, so the job is a green no-op (no email).
      - name: Check whether any channel needs image scanning
        id: precheck
        run: |
          if python -c "import image_scan, sys; sys.exit(0 if image_scan.needs_scan() else 1)"; then
            echo "need=1" >> "$GITHUB_OUTPUT"
          else
            echo "need=0" >> "$GITHUB_OUTPUT"
            echo "No channel has nsfw_images enabled - skipping the heavy scan."
          fi
      - name: Cache model + pip wheels
        if: steps.precheck.outputs.need == '1'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.NudeNet
          key: nsfw-onnx-${{ runner.os }}-v2
      - name: Install the free ONNX NSFW classifier (no API key)
        if: steps.precheck.outputs.need == '1'
        run: pip install --quiet nudenet
      - name: Scan recent images in nsfw-flagged channels
        if: steps.precheck.outputs.need == '1'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python image_scan.py
      - name: Save state
        if: steps.precheck.outputs.need == '1'
        run: |
          git config user.name "iboyprime-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add state_image.json 2>/dev/null || true
          git commit -m "image-scan state [skip ci]" || echo "no changes"
          git push || true
