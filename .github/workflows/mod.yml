name: Moderation Patrol
on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (second layer behind real-time AutoMod)
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: bot-mod
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Patrol chat for spam
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python mod_bot.py
      - name: Save state
        run: |
          git config user.name "iboyprime-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add state_mod.json 2>/dev/null || true
          git commit -m "mod state [skip ci]" || echo "no changes"
          git push || true
