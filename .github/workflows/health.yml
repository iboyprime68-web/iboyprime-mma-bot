name: Weekly Health Report
on:
  schedule:
    - cron: '0 9 * * 1'    # Monday 09:00 UTC - one silent staff embed
  workflow_dispatch:
permissions:
  contents: read
  actions: read
concurrency:
  group: bot-health
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Post the weekly health report (stateless)
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python health_bot.py
