name: UFC Rankings Tracker
on:
  schedule:
    - cron: '23 */6 * * *'   # every 6 hours (offset)
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: bot-rankings
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check UFC rankings for movement
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python rankings_bot.py
      - name: Save state
        run: |
          git config user.name "iboyprime-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add state_rankings.json 2>/dev/null || true
          git commit -m "rankings state [skip ci]" || echo "no changes"
          git push || true
