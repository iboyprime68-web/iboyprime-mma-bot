name: Server Polish (manual)
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Guild description, welcome screen, topics, roles guide
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python server_polish.py
