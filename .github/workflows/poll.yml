name: MMA Poll
on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (public repo = unlimited free)
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: mma-poll
  cancel-in-progress: false
jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Poll ESPN and post to Discord
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python mma_bot.py
      - name: Save state back to repo (only changes when something was posted)
        run: |
          git config user.name "iboyprime-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add mma_state.json
          git commit -m "Update MMA state [skip ci]" || echo "no changes"
          git push || true
