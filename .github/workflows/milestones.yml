name: Creator Milestones
on:
  schedule:
    - cron: '37 */6 * * *'   # every 6 hours
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: bot-milestones
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check creator milestones
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_USER_TOKEN: ${{ secrets.TWITCH_USER_TOKEN }}
        run: python milestones_bot.py
      - name: Save state
        run: |
          git config user.name "iboyprime-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add state_milestones.json 2>/dev/null || true
          git commit -m "milestones state [skip ci]" || echo "no changes"
          git push || true
