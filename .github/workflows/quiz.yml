name: Quiz Night
on:
  schedule:
    - cron: '0 19 * * 5'   # Friday 19:00 UTC - the whole quiz runs in this one job
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: bot-quiz
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run quiz night (5 timed polls + scoring)
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python quiz_bot.py
      - name: Save state
        run: |
          git config user.name "iboyprime-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add state_quiz.json 2>/dev/null || true
          git commit -m "quiz state [skip ci]" || echo "no changes"
          git push || true
