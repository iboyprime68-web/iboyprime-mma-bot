name: Raid Watch
on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min, then samples ~1/min internally (run_loop)
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: bot-raid
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Watch for join spikes
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python raid_bot.py
      - name: Save state
        run: |
          git config user.name "iboyprime-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add state_raid.json 2>/dev/null || true
          git commit -m "raid state [skip ci]" || echo "no changes"
          git push || true
