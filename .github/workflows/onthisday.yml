name: On This Day in MMA
on:
  schedule:
    - cron: '30 13 * * *'   # daily, 13:30 UTC
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: bot-onthisday
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Post On This Day + trivia
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python onthisday_bot.py
      - name: Save state
        run: |
          git config user.name "iboyprime-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add state_onthisday.json 2>/dev/null || true
          git commit -m "onthisday state [skip ci]" || echo "no changes"
          git push || true
