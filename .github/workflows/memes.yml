name: Daily Memes
on:
  schedule:
    - cron: '40 17 * * *'   # once a day, 17:40 UTC (a couple of memes)
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: bot-memes
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Post a couple of memes
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python memes_bot.py
      - name: Save state
        run: |
          git config user.name "iboyprime-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add state_memes.json 2>/dev/null || true
          git commit -m "memes state [skip ci]" || echo "no changes"
          git push || true
